papers:
  path: ./data/papers
  filetypes: ['.pdf']

vector_store:
  db_path: ./papers_db
  collection_name: papers
  n_results: 6

chunking:
  chunk_size: 600
  chunk_overlap: 75

embedding:
  model_name: all-MiniLM-L6-v2

claude:
  model: claude-sonnet-4-20250514
  max_tokens: 1024

tracking:
  backend: both  # Options: json, mlflow, both
  json:
    experiments_dir: ./experiments
  mlflow:
    experiment_name: rag_papers
    tracking_uri: null  # null = local ./mlruns

